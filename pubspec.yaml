name: pelerain
description: Comparateur et pré-réservation de billets de transport au Burkina Faso
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # HTTP
  dio: ^5.8.0+1

  # Data models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.3.5

  # Sound & Haptics
  just_audio: ^0.9.46

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.17
  intl: ^0.20.2
  gap: ^3.0.1

  # Utils
  uuid: ^4.5.1

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.5

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/sounds/
    - assets/lottie/
