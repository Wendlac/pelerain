name: pelerain
description: Comparateur de trajets interurbains au Burkina Faso (Ouagadougou ↔ Bobo-Dioulasso)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  gap: ^3.0.1

  # Maps (for company agencies)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Backend (anonymous read-only access in the MVP)
  supabase_flutter: ^2.8.0

  # Animations (Lottie used on the search loading screen)
  lottie: ^3.1.3

  # External actions: call agency / open WhatsApp from the company detail screen
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
